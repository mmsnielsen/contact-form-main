<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>Frontend Mentor | Contact form</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>Contact Us</header>

      <form action="#" method="get" class="contact-form">
        <div class="name-row">
          <div class="user-details">
            <label for="first-name" class="first-name"
              >First Name <span class="required">*</span></label
            >
            <input type="text" id="first-name" name="first-name" required />
          </div>
          <div class="user-details">
            <label for="last-name" class="last-name"
              >Last Name <span class="required">*</span></label
            >
            <input type="text" id="last-name" name="last-name" required />
          </div>
        </div>

        <div class="user-details">
          <label for="email" class="email"
            >Email Address <span class="required">*</span></label
          >
          <input type="email" id="email" name="email" required />
        </div>

        <label class="query-type"
          >Query Type <span class="required">*</span></label
        >
        <div class="radio-group">
          <div class="radio-option">
            <input
              type="radio"
              id="general"
              name="query-type"
              value="general"
              required
            />
            <label for="general">General Enquiry</label>
          </div>

          <div class="radio-option">
            <input
              type="radio"
              id="support"
              name="query-type"
              value="support"
              required
            />
            <label for="support">Support Request</label>
          </div>
        </div>

        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <br />
        <input type="checkbox" id="consent" name="consent" required />
        <label for="consent"
          >I consent to being contacted by the team
          <span class="required">*</span></label
        >
        <br />
        <div class="submit-button">
          <input type="submit" value="Submit!" />
        </div>
        To submit this form, please consent to being contacted Submit Message
        Sent! Thanks for completing the form. We'll be in touch soon!
      </form>
    </div>

    <!--<div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.

      <a href="https://github.com/mmsnielsen/contact-form-main"
        >pocketsizelasagne</a
      >.
    </div>-->
  </body>
  <script src="src/index.js"></script>
</html>
