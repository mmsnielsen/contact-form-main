<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>Frontend Mentor | Contact form</title>

    </style>
  </head>
  <body>
    <div class="container">
      <h1>Contact Us</h1>

      <form action="#" method="get" class="contact-form">
        <div class="name-row">
          <div class="user-details">
            <label for="first-name" class="first-name"
              >First Name <span class="required">*</span></label
            >
            <input
              type="text"
              id="first-name"
              name="first-name"
              placeholder=" "
              required
            />
            <span class="error-text">This field is required</span>
          </div>
          <div class="user-details">
            <label for="last-name" class="last-name"
              >Last Name <span class="required">*</span></label
            >
            <input
              type="text"
              id="last-name"
              name="last-name"
              placeholder=" "
              required
            />
            <span class="error-text">This field is required</span>
          </div>
        </div>

        <div class="user-details">
          <label for="email" class="email"
            >Email Address <span class="required">*</span></label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder=" "
            required
          />
          <span class="error-text">Please enter a valid email address</span>
        </div>

        <label class="query-type"
          >Query Type <span class="required">*</span></label
        >
        <div class="radio-group">
          <div class="radio-option">
            <input
              type="radio"
              id="general"
              name="query-type"
              value="general"
              required
            />
            <label for="general">General Enquiry</label>
          </div>
          <div class="radio-option">
            <input
              type="radio"
              id="support"
              name="query-type"
              value="support"
              required
            />
            <label for="support">Support Request</label>
          </div>
        </div>
        <span class="error-text">Please select a query type</span>

        <div class="user-details">
          <label for="message">Message <span class="required">*</span></label>
          <textarea
            id="message"
            name="message"
            rows="3"
            placeholder=" "
          ></textarea>
          <span class="error-text">This field is required</span>
        </div>

        <div class="consent-group">
          <input type="checkbox" id="consent" name="consent" required />
          <label for="consent"
            >I consent to being contacted by the team
            <span class="required">*</span></label
          >
          <span class="error-text">To submit this form, please consent to being contacted</span>
        </div>

        <div class="submit-button">
          <input type="submit" value="Submit" />
        </div>
      </form>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
